<svg xmlns="http://www.w3.org/2000/svg" width="260" height="56" viewBox="0 0 260 56" role="img" aria-label="Comece por aqui...">
  <defs>
    <filter id="paper-noise" x="-10%" y="-40%" width="120%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.72
                0 0 0 0 0.62
                0 0 0 0 0.48
                0 0 0 .18 0" result="tint"/>
      <feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
    </filter>

    <filter id="typed-shadow" x="-12%" y="-60%" width="124%" height="220%">
      <feDropShadow dx="1.1" dy="0.5" stdDeviation="0.15" flood-color="#8B1E1E" flood-opacity="0.62"/>
      <feDropShadow dx="-0.35" dy="0" stdDeviation="0.10" flood-color="#CEC8C1" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="260" height="56" fill="transparent"/>

  <!-- Impressão vermelha levemente fora de registro, como tinta antiga desalinhada -->
  <text x="10" y="34"
        font-family="'Special Elite', 'Courier New', monospace"
        font-size="20"
        letter-spacing="1.3"
        fill="#8B1E1E"
        opacity="0.46">"Comece por aqui..."</text>

  <!-- Impressão principal, com falhas sutis de máquina de escrever -->
  <g filter="url(#typed-shadow)">
    <text x="9" y="33"
          font-family="'Special Elite', 'Courier New', monospace"
          font-size="20"
          letter-spacing="1.3"
          fill="#CEC8C1"
          opacity="0.88"
          filter="url(#paper-noise)">"Comece por aqui..."</text>
  </g>

  <!-- Pequenas falhas discretas de tinta -->
  <g opacity="0.22" fill="#070707">
    <rect x="55" y="25" width="7" height="1.1" rx=".4"/>
    <rect x="128" y="20" width="5" height="1" rx=".4"/>
    <rect x="183" y="31" width="8" height="1.1" rx=".4"/>
    <rect x="224" y="24" width="5" height="1" rx=".4"/>
  </g>
</svg>
